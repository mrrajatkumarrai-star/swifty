<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1f36;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
    }
    .header p {
      margin: 4px 0 0;
      color: #636c7b;
      font-size: 16px;
    }

    .app-container {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }
    .app {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .app h2 {
      margin: 0;
      padding: 12px 16px;
      background: #1a1f36;
      color: white;
      font-size: 16px;
      font-weight: 500;
    }
    .app iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }
      .app iframe {
        height: 400px;
      }
    }

    .password-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .password-box {
      background: white;
      padding: 24px 32px;
      border-radius: 10px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }
    .password-box h2 {
      margin-top: 0;
      font-size: 20px;
      color: #1a1f36;
    }
    .password-box p {
      margin: 8px 0 20px;
      color: #636c7b;
      font-size: 14px;
    }
    .password-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }
    .password-box button {
      margin-top: 16px;
      padding: 10px 16px;
      background: #1a1f36;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    .password-box button:hover {
      background: #252b4a;
    }
    .error {
      color: #d93025;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- main password screen -->
  <div class="password-screen" id="passwordScreen">
    <div class="password-box">
      <h2>Enter Password</h2>
      <p>This page is password protected.</p>
      <input type="password" id="pwdInput" placeholder="Enter password" />
      <button id="pwdBtn">Access</button>
      <div id="pwdError" class="error" style="display:none;">Incorrect password.</div>
    </div>
  </div>

  <!-- main app UI (hidden until password is correct) -->
  <div id="app" style="display:none;">
    <div class="container">
      <div class="header">
        <h1>RAJAT DASHBOARD</h1>
        <p>Two Vercel apps in one view</p>
      </div>

      <div class="app-container">
        <!-- FIRST VERCEL APP -->
        <div class="app">
          <h2>Swifty Pi App</h2>
          <iframe src="https://swifty-pi.vercel.app/" title="Swifty Pi"></iframe>
        </div>

        <!-- SECOND VERCEL APP -->
        <div class="app">
          <h2>Carrier App</h2>
          <iframe src="https://carrier-app-ten.vercel.app/" title="Carrier App"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🔐 Change this to your desired password
    const correctPassword = "yoursupersecretpass"; // <-- CHANGE ME

    const pwdInput = document.getElementById("pwdInput");
    const pwdBtn = document.getElementById("pwdBtn");
    const pwdError = document.getElementById("pwdError");
    const passwordScreen = document.getElementById("passwordScreen");
    const appDiv = document.getElementById("app");

    function tryPassword() {
      const value = pwdInput.value.trim();
      if (value === correctPassword) {
        passwordScreen.style.display = "none";
        appDiv.style.display = "block";
        return;
      }
      pwdError.style.display = "block";
    }

    pwdBtn.addEventListener("click", tryPassword);
    pwdInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") tryPassword();
    });

    // focus input on load
    window.addEventListener("load", function () {
      pwdInput.focus();
    });
  </script>
</body>
</html>
