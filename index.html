<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swifty - Freight Rate CRM</title>

<style>
body{font-family:Calibri;background:#f4f6f9;margin:0}
.header{background:#1f2937;color:#fff;padding:10px;font-weight:600}
.container{padding:12px}

input, select{
  height:28px;padding:4px;margin:3px;
  border:1px solid #ccc;border-radius:6px;
  text-transform:uppercase;
}

button{height:28px;margin:3px;border:none;border-radius:6px;padding:0 10px;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#9ca3af}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:5px;font-size:12px}
th{background:#e5e7eb;cursor:pointer}

.actions button{margin:2px}
</style>
</head>

<body>
<div class="header">Swifty - Freight Rate CRM</div>

<div class="container">

<!-- SEARCH -->
<input id="search" placeholder="Search anything...">

<!-- FORM -->
<div>
<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">
<input id="fpod" placeholder="FPOD">
<input id="dv20" placeholder="20DV USD">
<input id="hc40" placeholder="40HC USD">
<input id="validity" type="date">
<input id="ft" placeholder="F/T Days">
<input id="tt" placeholder="TT Days">
<input id="via" placeholder="Routing">
<input id="remarks" placeholder="Internal Remarks">

<button class="primary" id="save">Save</button>
<button id="update">Update</button>
<button class="secondary" id="clear">Clear</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th onclick="sortData('carrier')">Carrier</th>
<th onclick="sortData('pol')">POL</th>
<th onclick="sortData('pod')">POD</th>
<th onclick="sortData('dv20')">20DV</th>
<th onclick="sortData('hc40')">40HC</th>
<th onclick="sortData('validity')">Validity</th>
<th onclick="sortData('tt')">TT</th>
<th onclick="sortData('via')">Routing</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDrJFZfIgXwzFX1d2jdCUT8oykGmGbg0IE",
  authDomain: "swifty-52e05.firebaseapp.com",
  projectId: "swifty-52e05",
  storageBucket: "swifty-52e05.firebasestorage.app",
  messagingSenderId: "230029744245",
  appId: "1:230029744245:web:1e6335ddb8d116ad9a003c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let filteredData = [];
let editId = null;
let sortDir = 1;

const $ = id => document.getElementById(id);

/* CAPITALIZE */
function upper(v){
  return (v || "").toUpperCase();
}

function clean(v){ return v || "-"; }

/* FORMAT */
function formatRate(r){
  return `O/F FM ${clean(r.pol)} TO ${clean(r.pod)} @ USD ${clean(r.dv20)}/20DV & USD ${clean(r.hc40)}/40HC
VALIDITY: ${clean(r.validity)}
F/T: ${clean(r.ft)} DAYS
TT: ${clean(r.tt)} DAYS
ROUTING: ${clean(r.via)}`;
}

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"rates"));
  data=[];
  snap.forEach(d=>data.push({id:d.id,...d.data()}));
  filteredData = [...data];
  render();
}

/* RENDER */
function render(){
  let html="";
  filteredData.forEach(r=>{
    html+=`
    <tr>
      <td>${upper(r.carrier)}</td>
      <td>${upper(r.pol)}</td>
      <td>${upper(r.pod)}</td>
      <td>${r.dv20||""}</td>
      <td>${r.hc40||""}</td>
      <td>${r.validity||""}</td>
      <td>${r.tt||""}</td>
      <td>${upper(r.via)}</td>
      <td class="actions">
        <button onclick="copyRate('${r.id}')">Copy</button>
        <button onclick="editRate('${r.id}')">Edit</button>
        <button onclick="delRate('${r.id}')">Delete</button>
      </td>
    </tr>`;
  });
  $("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async ()=>{
  const d = getForm();
  await addDoc(collection(db,"rates"), d);
  clearForm();
  load();
};

/* UPDATE */
$("update").onclick=async ()=>{
  if(!editId) return;
  const d = getForm();
  await updateDoc(doc(db,"rates",editId), d);
  clearForm();
  load();
};

/* DELETE */
window.delRate = async (id)=>{
  await deleteDoc(doc(db,"rates",id));
  load();
};

/* EDIT */
window.editRate = (id)=>{
  const r = data.find(x=>x.id===id);
  editId=id;
  Object.keys(r).forEach(k=>{
    if($(k)) $(k).value=r[k];
  });
};

/* COPY */
window.copyRate = (id)=>{
  const r = data.find(x=>x.id===id);
  navigator.clipboard.writeText(formatRate(r));
};

/* FORM */
function getForm(){
  return {
    carrier:upper($("carrier").value),
    por:upper($("por").value),
    pol:upper($("pol").value),
    pod:upper($("pod").value),
    fpod:upper($("fpod").value),
    dv20:$("dv20").value,
    hc40:$("hc40").value,
    validity:$("validity").value,
    ft:$("ft").value,
    tt:$("tt").value,
    via:upper($("via").value),
    remarks:$("remarks").value
  };
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  editId=null;
}

$("clear").onclick=clearForm;

/* SEARCH */
$("search").addEventListener("input", (e)=>{
  const val = e.target.value.toLowerCase();
  filteredData = data.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(val)
  );
  render();
});

/* SORT */
window.sortData = (key)=>{
  sortDir *= -1;
  filteredData.sort((a,b)=>{
    let A = a[key] || "";
    let B = b[key] || "";

    if(!isNaN(A) && !isNaN(B)){
      return (A-B)*sortDir;
    }
    return A.toString().localeCompare(B.toString())*sortDir;
  });
  render();
};

/* INIT */
load();

</script>
</body>
</html>
