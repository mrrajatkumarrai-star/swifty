w:auto;border-radius:16px;border:1px solid rgba(15,23,42,.08);background:rgba(255,255,255,.76)}table{width:100%;border-collapse:separate;border-spacing:0;min-width:1400px}th,td{padding:5px 7px;border-bottom:1px solid rgba(15,23,42,.08);text-align:center;white-space:nowrap;font-size:12px;line-height:1.1}th{position:sticky;top:0;background:rgba(249,250,251,.97);color:#111827;z-index:5;letter-spacing:.06em}.filter-row th{position:sticky;top:30px;background:rgba(248,250,252,.98);z-index:4;padding:4px 5px}.filter-row input{height:24px;padding:3px 6px;border-radius:10px;font-size:11px;background:rgba(255,255,255,.95)}tbody tr:hover{background:rgba(37,99,235,.04)}.actions{display:flex;gap:6px;justify-content:center}.actions button{width:28px;height:28px;padding:0;border-radius:10px;background:rgba(255,255,255,.92);color:#111827;border:1px solid rgba(15,23,42,.10)}.actions i,button i{color:#111827}.small-btn{width:28px;height:28px;padding:0;border-radius:10px}#pinGate,#modalOverlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.74);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}.card{width:min(540px,calc(100% - 28px));padding:24px;border-radius:26px;background:rgba(255,255,255,.88);border:1px solid rgba(15,23,42,.08);box-shadow:var(--shadow)}.pin-title{font-size:22px;font-weight:800;letter-spacing:.12em;text-align:center}.pin-sub{text-align:center;color:var(--muted);margin:8px 0 16px}.pin-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.pin-input{height:52px;text-align:center;font-size:20px;font-weight:800;letter-spacing:.2em}.pin-actions,.modal-actions{display:flex;gap:8px}.pin-actions button,.modal-actions button{flex:1;height:38px}.modal-title{font-size:18px;font-weight:800;margin-bottom:8px;letter-spacing:.1em}.modal-tabs{display:flex;gap:8px;margin-bottom:10px}.modal-tabs button{flex:1;height:34px;color:#111827;background:rgba(255,255,255,.92);border:1px solid rgba(15,23,42,.08)}.modal-tabs button.active{background:linear-gradient(135deg,#2563eb,#4f8cff);color:#fff}.modal-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr .8fr auto;gap:8px;margin-bottom:10px}.modal-grid input{height:32px}.compact-table th,.compact-table td{padding:4px 6px}.hidden{display:none !important}@media (max-width:1200px){.form{grid-template-columns:repeat(6,minmax(0,1fr))}.field-span-2,.field-span-3,.field-span-4,.field-span-6,.field-span-12,.vs{grid-column:span 6}}@media (max-width:700px){.form{grid-template-columns:repeat(2,minmax(0,1fr))}.field-span-2,.field-span-3,.field-span-4,.field-span-6,.field-span-12,.vs{grid-column:span 2}.container{padding:12px}}</style>

<body>
<div id="pinGate"><div class="card"><div class="pin-title">FR8X ACCESS</div><div class="pin-sub">ENTER 4 DIGIT PIN. ACCESS REMAINS OPEN FOR 4 HOURS.</div><div class="pin-row"><input class="pin-input" id="pin1" maxlength="1" inputmode="numeric" type="password"><input class="pin-input" id="pin2" maxlength="1" inputmode="numeric" type="password"><input class="pin-input" id="pin3" maxlength="1" inputmode="numeric" type="password"><input class="pin-input" id="pin4" maxlength="1" inputmode="numeric" type="password"></div><div class="pin-actions"><button class="primary" id="unlockBtn"><i class="bi bi-shield-lock"></i> UNLOCK</button><button class="ghost" id="clearPinBtn"><i class="bi bi-eraser"></i> CLEAR</button></div></div></div>

<div id="appShell" class="hidden"><div class="header">FR8X CRM</div><div class="ticker"><div class="ticker-track" id="tickerTrack"></div></div><div class="container"><div class="topbar"><input id="globalSearch" placeholder="GLOBAL SEARCH"><div class="small-note"><span class="badge" id="sessionInfo">ACCESS ACTIVE</span></div></div><div class="form"><input class="field-span-3" id="carrier" placeholder="CARRIER"><input class="field-span-2" id="por" placeholder="POR"><input class="field-span-2" id="pol" placeholder="POL"><input class="field-span-2" id="pod" placeholder="POD"><input class="field-span-2" id="dv20" placeholder="USD 20DV"><input class="field-span-2" id="hc40" placeholder="USD 40HC"><input class="field-span-2" id="ft" placeholder="F/T"><input class="field-span-2" id="validity" type="date"><input class="field-span-2" id="tt" placeholder="TT"><input class="field-span-4" id="via" placeholder="ROUTING"><input class="field-span-4" id="remarks" placeholder="REMARKS"><div class="vs"><label><input type="checkbox" id="vtype" checked>V</label><label><input type="checkbox" id="stype">S</label></div><button class="primary field-span-2" id="save"><i class="bi bi-floppy"></i> SAVE</button><button class="success field-span-2" id="update"><i class="bi bi-file-arrow-up"></i> UPDATE</button><button class="danger field-span-2" id="clear"><i class="bi bi-x-octagon"></i> CLEAR</button><button class="ghost field-span-2" id="openLocal"><i class="bi bi-plus-lg"></i> LOCAL</button><button class="ghost field-span-2" id="open20"><i class="bi bi-plus-lg"></i> 20DV</button><button class="ghost field-span-2" id="open40"><i class="bi bi-plus-lg"></i> 40HC</button></div><div class="section-head"><div class="small-note">RATES</div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>CARRIER</th><th>POR</th><th>POL</th><th>POD</th><th>20DV</th><th>40HC</th><th>F/T</th><th>DATE</th><th>TYPE</th><th>TT</th><th>ROUTING</th><th>REMARKS</th><th>ACTION</th></tr><tr class="filter-row"><th><input data-col="seq" placeholder="SEARCH"></th><th><input data-col="carrier" placeholder="SEARCH"></th><th><input data-col="por" placeholder="SEARCH"></th><th><input data-col="pol" placeholder="SEARCH"></th><th><input data-col="pod" placeholder="SEARCH"></th><th><input data-col="dv20" placeholder="SEARCH"></th><th><input data-col="hc40" placeholder="SEARCH"></th><th><input data-col="ft" placeholder="SEARCH"></th><th><input data-col="validity" placeholder="SEARCH"></th><th><input data-col="type" placeholder="SEARCH"></th><th><input data-col="tt" placeholder="SEARCH"></th><th><input data-col="via" placeholder="SEARCH"></th><th><input data-col="remarks" placeholder="SEARCH"></th><th></th></tr></thead><tbody id="tbody"></tbody></table></div></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
const app=initializeApp({projectId:"swifty-52e05"});const db=getFirestore(app);let data=[], editId=null, activeModal="", modalItems=[], activeChargeField="localCharges";let filterMap={seq:"",carrier:"",por:"",pol:"",pod:"",dv20:"",hc40:"",ft:"",validity:"",type:"",tt:"",via:"",remarks:""};const $=id=>document.getElementById(id);const upper=v=>(v||"").toUpperCase();const PIN="1234";const KEY="fr8x_pin_until";const FOUR_HOURS=4*60*60*1000;
function calc(v){v=(v||"").replace(/\s+/g,"+");if(v.includes("+")){try{return String(v.split("+").map(Number).reduce((a,b)=>a+b,0));}catch{return v}}return v}
function formatDate(d){if(!d)return"";return new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase()}
function sessionValid(){const t=+localStorage.getItem(KEY)||0;return Date.now()<t}
function setSession(){localStorage.setItem(KEY,String(Date.now()+FOUR_HOURS))}
function showApp(){$("pinGate").classList.add("hidden");$("appShell").classList.remove("hidden");load()}
if(sessionValid()) showApp();
async function load(){const s=await getDocs(collection(db,"rates"));data=[];s.forEach(d=>data.push({id:d.id,...d.data()}));render();renderTicker()}
function applyFilters(rows){return rows.filter(r=>{for(const k in filterMap){const q=filterMap[k].trim().toUpperCase();if(!q) continue;const val=(k==="validity"?formatDate(r[k]||""):(r[k]||"")).toString().toUpperCase();if(!val.includes(q)) return false}return true})}
function render(){const g=($("globalSearch").value||"").toUpperCase();let rows=applyFilters(data);if(g) rows=rows.filter(r=>JSON.stringify(r).toUpperCase().includes(g));let h="";rows.forEach(r=>{h+=`<tr><td>${r.seq||""}</td><td>${r.carrier||""}</td><td>${r.por||""}</td><td>${r.pol||""}</td><td>${r.pod||""}</td><td>${r.dv20||""}</td><td>${r.hc40||""}</td><td>${r.ft||""}</td><td>${formatDate(r.validity)}</td><td>${r.type||""}</td><td>${r.tt||""}</td><td>${r.via||""}</td><td>${r.remarks||""}</td><td class="actions"><button onclick="copyRate('${r.id}')"><i class="bi bi-clipboard"></i></button><button onclick="editRate('${r.id}')"><i class="bi bi-pencil-square"></i></button><button onclick="delRate('${r.id}')"><i class="bi bi-x-square"></i></button></td></tr>`});$("tbody").innerHTML=h}
$("globalSearch").oninput=render;document.querySelectorAll(".filter-row input").forEach(inp=>inp.addEventListener("input",e=>{filterMap[e.target.dataset.col]=e.target.value;render()}));
async function loadExchangeRates(){try{const res=await fetch("https://api.frankfurter.dev/v2/rates?base=INR&quotes=USD,GBP,JPY,EUR");const data=await res.json();const rates=data.rates||data;$("tickerTrack").innerHTML=`<span><span class="muted">USD/INR</span> <span class="up">${rates.USD||"-"}</span></span><span><span class="muted">EUR/INR</span> <span class="down">${rates.EUR||"-"}</span></span><span><span class="muted">GBP/INR</span> <span class="up">${rates.GBP||"-"}</span></span><span><span class="muted">JPY/INR</span> <span class="up">${rates.JPY||"-"}</span></span>`}catch(err){console.error("Exchange rate load failed",err)}}
loadExchangeRates();setInterval(loadExchangeRates,5*60*1000);
window.copyRate=async(id)=>{const r=data.find(x=>x.id===id);const lines=[];if(r.carrier) lines.push(`CARRIER: ${r.carrier}`);if(r.por) lines.push(`(POR): ${r.por}`);lines.push(`O/F FM ${r.pol||""} TO ${r.pod||""} @ USD ${r.dv20||""}/20DV & USD ${r.hc40||""}/40HC`);if(r.ft) lines.push(`F/T: ${r.ft} DAYS`);if(r.validity) lines.push(`VALIDITY: ${formatDate(r.validity)}`);if(r.tt) lines.push(`TT: ${r.tt} (DAYS)`);if(r.via) lines.push(`ROUTING: ${r.via}`);if(r.remarks) lines.push(`REMARKS: ${r.remarks}`);try{await navigator.clipboard.writeText(lines.join("\n"))}catch{const t=document.createElement("textarea");t.value=lines.join("\n");document.body.appendChild(t);t.select();document.execCommand("copy");t.remove()}alert("COPIED")};
window.editRate=(id)=>{const r=data.find(x=>x.id===id);editId=id;Object.keys(r).forEach(k=>{if($(k))$(k).value=r[k]});};
window.delRate=async(id)=>{if(!confirm("DELETE THIS RATE?")) return;await deleteDoc(doc(db,"rates",id));load()};
function clearForm(resetEdit=true){["carrier","por","pol","pod","dv20","hc40","ft","validity","tt","via","remarks"].forEach(id=>$(id).value="");$("stype").checked=false;$("vtype").checked=true;if(resetEdit) editId=null}
$("save").onclick=async()=>{await addDoc(collection(db,"rates"),{carrier:upper($("carrier").value),por:upper($("por").value),pol:upper($("pol").value),pod:upper($("pod").value),dv20:calc($("dv20").value),hc40:calc($("hc40").value),ft:$("ft").value,validity:$("validity").value,tt:$("tt").value,via:$("via").value,remarks:upper($("remarks").value),type:$("stype").checked?"S":"V",localCharges:[],charges20dv:[],charges40hc:[]});clearForm();load()};
$("update").onclick=async()=>{if(!editId) return alert("SELECT A RECORD TO UPDATE.");const current=data.find(x=>x.id===editId)||{};await updateDoc(doc(db,"rates",editId),{carrier:upper($("carrier").value),por:upper($("por").value),pol:upper($("pol").value),pod:upper($("pod").value),dv20:calc($("dv20").value),hc40:calc($("hc40").value),ft:$("ft").value,validity:$("validity").value,tt:$("tt").value,via:$("via").value,remarks:upper($("remarks").value),type:$("stype").checked?"S":"V",localCharges:current.localCharges||[],charges20dv:current.charges20dv||[],charges40hc:current.charges40hc||[]});load()};
$("clear").onclick=()=>clearForm(true);
function unlock(){const pin=[$("pin1").value,$("pin2").value,$("pin3").value,$("pin4").value].join("");if(pin===PIN){setSession();showApp()}else{alert("INVALID PIN");clearPin()}}
function clearPin(){["pin1","pin2","pin3","pin4"].forEach(id=>$(id).value="");$("pin1").focus()}
["pin1","pin2","pin3","pin4"].forEach((id,i,arr)=>{$(id).addEventListener("input",e=>{e.target.value=e.target.value.replace(/\D/g,"").slice(0,1);if(e.target.value&&arr[i+1]) $(arr[i+1]).focus()});$(id).addEventListener("keydown",e=>{if(e.key==="Backspace"&&!e.target.value&&arr[i-1]) $(arr[i-1]).focus();if(e.key==="Enter") unlock()})});$("unlockBtn").onclick=unlock;$("clearPinBtn").onclick=clearPin;clearPin();
function getChargeField(type){if(type==="20dv") return "charges20dv";if(type==="40hc") return "charges40hc";return "localCharges"}
function loadModalItems(){const r=editId?data.find(x=>x.id===editId):null;modalItems=r&&Array.isArray(r[activeChargeField])?[...r[activeChargeField]]:[]}
function setModalTitle(){$("modalTitle").textContent=activeModal==="local"?"LOCAL CHARGES":activeModal==="20dv"?"20DV CHARGES":"40HC CHARGES"}
window.openChargesModal=(type)=>{activeModal=type;activeChargeField=getChargeField(type);loadModalItems();setModalTitle();document.querySelectorAll(".modal-tabs button").forEach(b=>b.classList.remove("active"));if(type==="local") $("tabLocal").classList.add("active");if(type==="20dv") $("tab20").classList.add("active");if(type==="40hc") $("tab40").classList.add("active");$("modalOverlay").classList.remove("hidden");renderModal()};
window.closeModal=()=>{$("modalOverlay").classList.add("hidden");activeModal=""};
window.setChargeMode=(type)=>{activeModal=type;activeChargeField=getChargeField(type);loadModalItems();setModalTitle();document.querySelectorAll(".modal-tabs button").forEach(b=>b.classList.remove("active"));if(type==="local") $("tabLocal").classList.add("active");if(type==="20dv") $("tab20").classList.add("active");if(type==="40hc") $("tab40").classList.add("active");renderModal()};
function updateModalTotal(){const a=parseFloat($("mAmount").value||"0");const u=parseFloat($("mUnits").value||"1");$("mTotal").value=((a||0)*(u||1))||""}
function renderModal(){let h="";modalItems.forEach((r,idx)=>{h+=`<tr><td>${r.head||""}</td><td>${r.currency||""}</td><td>${r.amount||""}</td><td>${r.units||""}</td><td>${r.total||""}</td><td><button class="danger small-btn" onclick="removeModalRow(${idx})"><i class="bi bi-x-lg"></i></button></td></tr>`});$("modalBody").innerHTML=h}
window.removeModalRow=i=>{modalItems.splice(i,1);renderModal()};
$("mAmount").oninput=updateModalTotal;$("mUnits").oninput=updateModalTotal;
$("mAdd").onclick=()=>{modalItems.push({head:upper($("mHead").value),currency:upper($("mCurrency").value),amount:upper($("mAmount").value),units:upper($("mUnits").value),total:upper($("mTotal").value)});["mHead","mCurrency","mAmount","mUnits","mTotal"].forEach(id=>$(id).value="");renderModal()};
$("saveChargesBtn").onclick=async()=>{if(!editId) return alert("SELECT A RECORD FIRST.");const payload={[activeChargeField]:modalItems};await updateDoc(doc(db,"rates",editId),payload);const rec=data.find(x=>x.id===editId);if(rec) rec[activeChargeField]=modalItems;closeModal()};
$("openLocal").onclick=()=>openChargesModal("local");$("open20").onclick=()=>openChargesModal("20dv");$("open40").onclick=()=>openChargesModal("40hc");
</script>
