<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freight Rate CRM</title>

<style>
body{font-family:Calibri;background:#f4f6f9;margin:0}
.header{background:#1f2937;color:#fff;padding:10px;font-weight:600}
.container{padding:12px}

input{height:26px;padding:4px;margin:3px;border:1px solid #ccc;border-radius:6px}
button{height:28px;margin:3px;border:none;border-radius:6px;padding:0 10px;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#9ca3af}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:5px;font-size:12px}
th{background:#e5e7eb}

.actions button{margin:2px}
</style>
</head>

<body>
<div class="header">Freight Rate CRM</div>

<div class="container">

<!-- FORM -->
<div>
<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">
<input id="fpod" placeholder="FPOD">
<input id="dv20" placeholder="20DV USD">
<input id="hc40" placeholder="40HC USD">
<input id="validity" placeholder="Validity">
<input id="ft" placeholder="F/T Days">
<input id="tt" placeholder="TT Days">
<input id="via" placeholder="Routing">
<input id="remarks" placeholder="Internal Remarks">

<button class="primary" id="save">Save</button>
<button id="update">Update</button>
<button class="secondary" id="clear">Clear</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Carrier</th><th>POL</th><th>POD</th>
<th>20DV</th><th>40HC</th>
<th>Validity</th><th>TT</th>
<th>Routing</th><th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* 🔥 REPLACE WITH YOUR FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let editId = null;

/* HELPERS */
const $ = id => document.getElementById(id);

function clean(v){ return v || "-"; }

/* WHATSAPP FORMAT */
function formatRate(r){
  return `O/F FM ${clean(r.pol)} TO ${clean(r.pod)} @ USD ${clean(r.dv20)}/20DV & USD ${clean(r.hc40)}/40HC
VALIDITY: ${clean(r.validity)}
F/T: ${clean(r.ft)} DAYS
TT: ${clean(r.tt)} DAYS
ROUTING: ${clean(r.via)}`;
}

/* LOAD */
async function load(){
  const snap = await getDocs(collection(db,"rates"));
  data=[];
  snap.forEach(d=>data.push({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  let html="";
  data.forEach(r=>{
    html+=`
    <tr>
      <td>${r.carrier||""}</td>
      <td>${r.pol||""}</td>
      <td>${r.pod||""}</td>
      <td>${r.dv20||""}</td>
      <td>${r.hc40||""}</td>
      <td>${r.validity||""}</td>
      <td>${r.tt||""}</td>
      <td>${r.via||""}</td>
      <td class="actions">
        <button onclick="copyRate('${r.id}')">Copy</button>
        <button onclick="editRate('${r.id}')">Edit</button>
        <button onclick="delRate('${r.id}')">Del</button>
      </td>
    </tr>`;
  });
  $("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async ()=>{
  const d = getForm();
  await addDoc(collection(db,"rates"), d);
  clearForm();
  load();
};

/* UPDATE */
$("update").onclick=async ()=>{
  if(!editId) return;
  const d = getForm();
  await updateDoc(doc(db,"rates",editId), d);
  clearForm();
  load();
};

/* DELETE */
window.delRate = async (id)=>{
  await deleteDoc(doc(db,"rates",id));
  load();
};

/* EDIT */
window.editRate = (id)=>{
  const r = data.find(x=>x.id===id);
  editId=id;
  Object.keys(r).forEach(k=>{
    if($(k)) $(k).value=r[k];
  });
};

/* COPY */
window.copyRate = (id)=>{
  const r = data.find(x=>x.id===id);
  navigator.clipboard.writeText(formatRate(r));
};

/* FORM */
function getForm(){
  return {
    carrier:$("carrier").value,
    por:$("por").value,
    pol:$("pol").value,
    pod:$("pod").value,
    fpod:$("fpod").value,
    dv20:$("dv20").value,
    hc40:$("hc40").value,
    validity:$("validity").value,
    ft:$("ft").value,
    tt:$("tt").value,
    via:$("via").value,
    remarks:$("remarks").value
  };
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  editId=null;
}

$("clear").onclick=clearForm;

/* INIT */
load();

</script>
</body>
</html>
