<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FR8X CRM</title>

<style>
body{font-family:Calibri;font-size:12px;margin:0;background:#fff;color:#111}
.header{padding:10px;font-weight:600;border-bottom:1px solid #ddd}
.main{padding:6px}

.form{display:grid;grid-template-columns:repeat(13,1fr);gap:5px;margin-bottom:6px}

input{height:26px;padding:2px 5px;border:1px solid #ccc;border-radius:4px;text-transform:uppercase}
button{height:26px;border:none;background:#eee;border-radius:4px;cursor:pointer}
.primary{background:#2563eb;color:#fff}

.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:4px;text-align:center}
td.num{text-align:right}
.actions{display:flex;gap:4px;justify-content:center}

@media(max-width:900px){
.form{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<div class="header">FR8X CRM</div>

<div class="main">

<div class="form">
<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">

<input id="dv20" placeholder="20DV">
<input id="hc40" placeholder="40HC">

<input id="currency" value="USD">

<input id="validity" type="date">
<input id="tt" placeholder="TT">
<input id="ft" placeholder="F/T">
<input id="via" placeholder="Routing">

<label><input type="checkbox" id="vtype" checked>V</label>
<label><input type="checkbox" id="stype">S</label>

<button class="primary" id="save">Save</button>
<button id="update">Update</button>
<button id="clear">Clear</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>ID</th><th>POL</th><th>POD</th>
<th>20DV</th><th>40HC</th>
<th>TT</th><th>F/T</th>
<th>Date</th><th>Type</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSy...",projectId:"swifty-52e05"});
const db=getFirestore(app);

let data=[],editId=null;

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* SMART CALC */
function calc(v){
v=v.replace(/\s+/g,"+");
return v.includes("+") ? v.split("+").map(Number).reduce((a,b)=>a+b,0) : v;
}

["dv20","hc40"].forEach(id=>{
$(id).oninput=()=>$(id).value=$(id).value.replace(/\s+/g,"+");
$(id).onblur=()=>$(id).value=calc($(id).value);
});

/* DATE */
function formatDate(d){
if(!d)return "";
const x=new Date(d);
return x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',weekday:'short'}).toUpperCase();
}

/* SEQ */
function seq(d,tt,t){
const x=new Date(d);
const base=`${String(x.getDate()).padStart(2,'0')}${String(x.getMonth()+1).padStart(2,'0')}${tt}${t}`;
const count=data.filter(r=>r.seq?.startsWith(base)).length+1;
return base+String(count).padStart(2,'0');
}

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"rates"));
data=[];snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

/* RENDER */
function render(){
let h="";
data.forEach(r=>{
h+=`<tr>
<td>${r.seq}</td>
<td>${r.pol}</td>
<td>${r.pod}</td>
<td class="num">${r.dv20}</td>
<td class="num">${r.hc40}</td>
<td>${r.tt}</td>
<td>${r.ft||""}</td>
<td>${formatDate(r.validity)}</td>
<td>${r.type}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')">📋</button>
<button onclick="editRate('${r.id}')">✏️</button>
<button onclick="dupRate('${r.id}')">⧉</button>
<button onclick="delRate('${r.id}')">🗑</button>
</td>
</tr>`;
});
$("tbody").innerHTML=h;
}

/* SAVE */
$("save").onclick=async()=>{
const t=$("stype").checked?"S":"V";
const s=seq($("validity").value,$("tt").value,t);

await addDoc(collection(db,"rates"),getForm(s));
alert("Saved");
clear();load();
};

/* UPDATE */
$("update").onclick=async()=>{
if(!editId)return;
await updateDoc(doc(db,"rates",editId),getForm());
alert("Updated");
clear();load();
};

/* DELETE */
window.delRate=async(id)=>{
await deleteDoc(doc(db,"rates",id));
alert("Deleted");
load();
};

/* EDIT */
window.editRate=id=>{
const r=data.find(x=>x.id===id);
editId=id;
Object.keys(r).forEach(k=>$(k) && ($(k).value=r[k]));
};

/* DUPLICATE */
window.dupRate=id=>{
const r=data.find(x=>x.id===id);
navigator.clipboard.writeText(JSON.stringify(r,null,2));
alert("Copied full record");
};

/* COPY */
window.copyRate=async(id)=>{
const r=data.find(x=>x.id===id);
const type=r.type==="S"?"SAILING":"VALIDITY";

const txt=
`${r.por?`(POR) : ${r.por}\n`:""}O/F FM ${r.pol} TO ${r.pod} @ ${r.currency||"USD"} ${r.dv20}/20DV & ${r.hc40}/40HC
VALIDITY: ${formatDate(r.validity)} (${type})
TT: ${r.tt} (DAYS)
F/T: ${r.ft||""} DAYS
ROUTING: ${r.via} (DAYS)
REF: ${r.seq}`;

navigator.clipboard.writeText(txt);
alert("Copied");
};

/* FORM */
function getForm(s=null){
return{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
currency:$("currency").value||"USD",
validity:$("validity").value,
tt:$("tt").value,
ft:$("ft").value,
via:$("via").value,
type:$("stype").checked?"S":"V",
seq:s||null
};
}

/* CLEAR */
function clear(){
document.querySelectorAll("input").forEach(i=>i.value="");
$("currency").value="USD";
$("vtype").checked=true;
$("stype").checked=false;
editId=null;
}

$("clear").onclick=clear;

load();

</script>

</body>
</html>
