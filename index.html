<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FR8X CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ===== PURE WHITE BASE ===== */
body{
margin:0;
font-family:Calibri;
font-size:12px;
background:#ffffff;
color:#111;
}

/* ===== HEADER ===== */
.header{
padding:10px 14px;
font-weight:600;
background:#ffffff;
border-bottom:1px solid #e5e7eb;
}

/* ===== MAIN ===== */
.main{
padding:8px;
}

/* ===== LIGHT GLASS ===== */
.glass{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(6px);
border:1px solid #e5e7eb;
border-radius:6px;
}

/* ===== FORM ===== */
.form-grid{
display:grid;
grid-template-columns:repeat(11,1fr);
gap:6px;
padding:8px;
margin-bottom:8px;
}

/* ===== INPUT ===== */
input{
height:26px;
padding:2px 6px;
border-radius:4px;
border:1px solid #d1d5db;
background:#fff;
color:#111;
font-size:12px;
text-transform:uppercase;
}

input::placeholder{
color:#6b7280;
}

/* ===== BUTTON ===== */
button{
height:26px;
border:none;
border-radius:4px;
background:#f1f5f9;
color:#111;
cursor:pointer;
padding:0 8px;
}
.primary{
background:#2563eb;
color:#fff;
}

/* ===== CHECK ===== */
.chk{
display:flex;
align-items:center;
gap:6px;
}

/* ===== TABLE ===== */
.table-wrap{
overflow:auto;
padding:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:4px 6px;
border-bottom:1px solid #e5e7eb;
text-align:center;
white-space:nowrap;
}

th{
background:#f9fafb;
font-weight:600;
}

td.num{
text-align:right;
}

/* ===== ACTION ===== */
.actions{
display:flex;
justify-content:center;
gap:4px;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
.form-grid{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<div class="header">FR8X CRM</div>

<div class="main">

<!-- FORM -->
<div class="glass form-grid">

<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">

<input id="dv20" placeholder="20DV">
<input id="hc40" placeholder="40HC">

<input id="validity" type="date">
<input id="tt" placeholder="TT">
<input id="via" placeholder="Routing">

<div class="chk">
<label><input type="checkbox" id="vtype" checked>V</label>
<label><input type="checkbox" id="stype">S</label>
</div>

<button class="primary" id="save"><i class="bi bi-save"></i></button>
<button id="clear"><i class="bi bi-x"></i></button>

</div>

<!-- TABLE -->
<div class="glass table-wrap">
<table>
<thead>
<tr>
<th>ID</th>
<th>POL</th>
<th>POD</th>
<th>20DV</th>
<th>40HC</th>
<th>DATE</th>
<th>TYPE</th>
<th>TT</th>
<th>ROUTING</th>
<th>ACTION</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"swifty-52e05.firebaseapp.com",
projectId:"swifty-52e05"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let data=[];

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* SMART CALC */
function calc(val){
if(!val) return "";
val=val.replace(/\s+/g,"+");
if(val.includes("+")){
try{return val.split("+").map(Number).reduce((a,b)=>a+b,0);}
catch{return val;}
}
return val;
}

["dv20","hc40"].forEach(id=>{
const el=$(id);
el.addEventListener("input",()=>el.value=el.value.replace(/\s+/g,"+"));
el.addEventListener("blur",()=>el.value=calc(el.value));
});

/* DATE */
function formatDate(d){
if(!d) return "";
const date=new Date(d);
const day=String(date.getDate()).padStart(2,'0');
const mon=date.toLocaleDateString('en-GB',{month:'short'}).toUpperCase();
const yr=date.getFullYear();
const wk=date.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase();
return `${day}-${mon}-${yr} (${wk})`;
}

/* SEQ */
function generateSeq(date,tt,type){
if(!date) return "";
const d=new Date(date);
const dd=String(d.getDate()).padStart(2,'0');
const mm=String(d.getMonth()+1).padStart(2,'0');
const base=`${dd}${mm}${tt}${type}`;
const count=data.filter(r=>r.seq && r.seq.startsWith(base)).length+1;
return base + String(count).padStart(2,'0');
}

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"rates"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

/* RENDER */
function render(){
let html="";
data.forEach(r=>{
html+=`
<tr>
<td>${r.seq}</td>
<td>${r.pol}</td>
<td>${r.pod}</td>
<td class="num">${r.dv20}</td>
<td class="num">${r.hc40}</td>
<td>${formatDate(r.validity)}</td>
<td>${r.type}</td>
<td>${r.tt}</td>
<td>${r.via}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')"><i class="bi bi-copy"></i></button>
</td>
</tr>`;
});
$("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async()=>{
const type = $("stype").checked ? "S" : "V";

const seq = generateSeq(
$("validity").value,
$("tt").value,
type
);

await addDoc(collection(db,"rates"),{
pol:upper($("pol").value),
pod:upper($("pod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
validity:$("validity").value,
tt:$("tt").value,
via:$("via").value,
type:type,
seq:seq,
por:upper($("por").value)
});

clearForm();
load();
};

/* COPY */
window.copyRate=async(id)=>{
const r=data.find(x=>x.id===id);
const type = r.type==="S"?"SAILING":"VALIDITY";

const text =
`${r.por ? `(POR) : ${r.por}\n` : ""}` +
`O/F FM ${r.pol} TO ${r.pod} @ USD ${r.dv20}/20DV & USD ${r.hc40}/40HC
VALIDITY: ${formatDate(r.validity)} (${type})
TT: ${r.tt} (DAYS)
ROUTING: ${r.via} (DAYS)
REF: ${r.seq}`;

navigator.clipboard.writeText(text);
};

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
$("vtype").checked=true;
$("stype").checked=false;
}

$("clear").onclick=clearForm;

load();

</script>

</body>
</html>
