<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FR8X CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{font-family:Calibri;margin:0;background:#eef2f7}
.header{background:#0f172a;color:#fff;padding:10px;font-weight:600}
.container{padding:8px}

input{
height:26px;padding:2px 6px;margin:2px;
border-radius:6px;border:1px solid #ccc;
text-transform:uppercase;font-size:12px;
}

button{
height:26px;margin:2px;padding:0 8px;
border:none;border-radius:6px;
background:#e2e8f0;cursor:pointer;
}
.primary{background:#2563eb;color:#fff}

table{width:100%;border-collapse:collapse}
th,td{
border:1px solid #d1d5db;
padding:3px 5px;
font-size:11px;
white-space:nowrap;
}
th{background:#e5e7eb}

.actions button{font-size:12px}
</style>
</head>

<body>
<div class="header">FR8X CRM</div>

<div class="container">

<!-- FORM -->
<div>
<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">
<input id="fpod" placeholder="FPOD">
<input id="dv20" placeholder="20DV USD">
<input id="hc40" placeholder="40HC USD">
<input id="validity" type="date">
<input id="ft" placeholder="F/T">
<input id="tt" placeholder="TT">
<input id="via" placeholder="Routing">

<button class="primary" id="save"><i class="bi bi-save"></i></button>
<button id="update"><i class="bi bi-arrow-repeat"></i></button>
<button id="clear"><i class="bi bi-x"></i></button>
</div>

<table>
<thead>
<tr>
<th>Carrier<br><input data-col="carrier"></th>
<th>POR<br><input data-col="por"></th>
<th>POL<br><input data-col="pol"></th>
<th>POD<br><input data-col="pod"></th>
<th>FPOD<br><input data-col="fpod"></th>
<th>20DV<br><input data-col="dv20"></th>
<th>40HC<br><input data-col="hc40"></th>
<th>Validity<br><input data-col="validity"></th>
<th>TT<br><input data-col="tt"></th>
<th>Routing<br><input data-col="via"></th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyDrJFZfIgXwzFX1d2jdCUT8oykGmGbg0IE",
authDomain:"swifty-52e05.firebaseapp.com",
projectId:"swifty-52e05",
storageBucket:"swifty-52e05.firebasestorage.app",
messagingSenderId:"230029744245",
appId:"1:230029744245:web:1e6335ddb8d116ad9a003c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let data=[],view=[],editId=null;

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* AUTO CALC */
function calc(val){
if(!val) return "";
if(val.includes("+")){
return val.split("+").map(Number).reduce((a,b)=>a+b,0);
}
return val;
}

["dv20","hc40"].forEach(id=>{
$(id).addEventListener("blur",()=>{
$(id).value=calc($(id).value);
});
});

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"rates"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
view=[...data];
render();
}

/* RENDER */
function render(){
let html="";
view.forEach(r=>{
html+=`
<tr>
<td>${r.carrier||""}</td>
<td>${r.por||""}</td>
<td>${r.pol||""}</td>
<td>${r.pod||""}</td>
<td>${r.fpod||""}</td>
<td>${r.dv20||""}</td>
<td>${r.hc40||""}</td>
<td>${r.validity||""}</td>
<td>${r.tt||""}</td>
<td>${r.via||""}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')"><i class="bi bi-copy"></i></button>
<button onclick="editRate('${r.id}')"><i class="bi bi-pencil"></i></button>
<button onclick="delRate('${r.id}')"><i class="bi bi-trash"></i></button>
</td>
</tr>`;
});
$("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async()=>{
await addDoc(collection(db,"rates"),getForm());
clearForm();load();
};

/* UPDATE */
$("update").onclick=async()=>{
if(!editId)return;
await updateDoc(doc(db,"rates",editId),getForm());
clearForm();load();
};

/* DELETE */
window.delRate=async(id)=>{
await deleteDoc(doc(db,"rates",id));load();
};

/* EDIT */
window.editRate=id=>{
const r=data.find(x=>x.id===id);
editId=id;
Object.keys(r).forEach(k=>{if($(k))$(k).value=r[k]});
};

/* 🔥 FINAL FIXED OUTPUT */
window.copyRate=id=>{
const r=data.find(x=>x.id===id);

const route = r.fpod 
  ? `${r.pol} TO ${r.fpod} VIA ${r.pod}`
  : `${r.pol} TO ${r.pod}`;

navigator.clipboard.writeText(
`O/F FM ${route} @ USD ${r.dv20}/20DV & USD ${r.hc40}/40HC
VALIDITY: ${r.validity}
TT: ${r.tt}
ROUTING: ${r.via}`
);
};

/* FORM */
function getForm(){
return{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
fpod:upper($("fpod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
validity:$("validity").value,
tt:$("tt").value,
via:upper($("via").value)
};
}

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
editId=null;
}

/* FILTER */
document.querySelectorAll("thead input").forEach(inp=>{
inp.oninput=()=>{
let f={};
document.querySelectorAll("thead input").forEach(i=>{
if(i.value)f[i.dataset.col]=i.value.toLowerCase();
});
view=data.filter(r=>{
return Object.keys(f).every(k=>
(r[k]||"").toLowerCase().includes(f[k])
);
});
render();
};
});

$("clear").onclick=clearForm;

load();

</script>
</body>
</html>
