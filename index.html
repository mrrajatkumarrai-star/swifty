<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FR8X CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{font-family:Calibri;font-size:12px;margin:0;background:#fff}

/* HEADER */
.header{
background:#0f172a;
color:#fff;
padding:10px;
font-weight:600
}

/* FULL WIDTH */
.container{
padding:6px;
width:100%;
box-sizing:border-box;
}

/* SEARCH */
#globalSearch{
margin-bottom:6px;
width:300px;
padding:4px;
}

/* FORM GRID (FIXED ALIGNMENT) */
.form{
display:grid;
grid-template-columns:repeat(13,1fr);
gap:6px;
margin-bottom:6px;
align-items:center;
}

/* INPUT */
input{
height:26px;
padding:2px 6px;
border-radius:4px;
border:1px solid #ccc;
font-size:12px;
text-transform:uppercase;
width:100%;
box-sizing:border-box;
}

/* BUTTON */
button{
height:26px;
border:none;
border-radius:4px;
background:#e2e8f0;
cursor:pointer;
}
.primary{background:#2563eb;color:#fff}

/* TABLE */
.table-wrap{
width:100%;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #d1d5db;
padding:3px 5px;
text-align:center;
white-space:nowrap;
}

td.num{text-align:right}

th{
background:#e5e7eb;
}

/* FILTER INPUTS */
th input{
width:100%;
font-size:11px;
}

/* ACTION */
.actions{
display:flex;
justify-content:center;
gap:4px;
}
</style>
</head>

<body>

<div class="header">FR8X CRM</div>

<div class="container">

<input id="globalSearch" placeholder="Global Search">

<!-- FORM -->
<div class="form">

<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">

<input id="dv20" placeholder="USD 20DV">
<input id="hc40" placeholder="USD 40HC">

<input id="ft" placeholder="F/T">
<input id="validity" type="date">
<input id="tt" placeholder="TT">
<input id="via" placeholder="Routing">

<label><input type="checkbox" id="vtype" checked>V</label>
<label><input type="checkbox" id="stype">S</label>

<button class="primary" id="save">Save</button>
<button id="update">Update</button>
<button id="clear">Clear</button>

</div>

<!-- TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>ID<br><input data-col="seq"></th>
<th>Carrier<br><input data-col="carrier"></th>
<th>POR<br><input data-col="por"></th>
<th>POL<br><input data-col="pol"></th>
<th>POD<br><input data-col="pod"></th>
<th>20DV<br><input data-col="dv20"></th>
<th>40HC<br><input data-col="hc40"></th>
<th>F/T<br><input data-col="ft"></th>
<th>Date<br><input data-col="validity"></th>
<th>Type<br><input data-col="type"></th>
<th>TT<br><input data-col="tt"></th>
<th>Routing<br><input data-col="via"></th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app=initializeApp({projectId:"swifty-52e05"});
const db=getFirestore(app);

let data=[],view=[],editId=null;

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* SMART CALC */
function calc(v){
v=v.replace(/\s+/g,"+");
if(v.includes("+")){
try{return v.split("+").map(Number).reduce((a,b)=>a+b,0);}
catch{return v;}
}
return v;
}

["dv20","hc40"].forEach(id=>{
$(id).oninput=e=>e.target.value=e.target.value.replace(/\s+/g,"+");
$(id).onblur=e=>e.target.value=calc(e.target.value);
});

/* DATE */
function formatDate(d){
if(!d)return"";
const dt=new Date(d);
return dt.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}

/* ROUTING CLEAN */
function cleanRouting(v){
if(!v)return"";
return v.replace(/^VIA\s*/i,"").trim();
}

/* SEQ */
function genSeq(d,tt,t){
if(!d)return"";
const dt=new Date(d);
const base=`${String(dt.getDate()).padStart(2,'0')}${String(dt.getMonth()+1).padStart(2,'0')}${tt}${t}`;
const c=data.filter(x=>x.seq?.startsWith(base)).length+1;
return base+String(c).padStart(2,'0');
}

/* LOAD */
async function load(){
const s=await getDocs(collection(db,"rates"));
data=[];
s.forEach(d=>data.push({id:d.id,...d.data()}));
view=[...data];
render();
}

/* RENDER */
function render(){
let h="";
view.forEach(r=>{
h+=`
<tr>
<td>${r.seq||""}</td>
<td>${r.carrier||""}</td>
<td>${r.por||""}</td>
<td>${r.pol||""}</td>
<td>${r.pod||""}</td>
<td class="num">${r.dv20||""}</td>
<td class="num">${r.hc40||""}</td>
<td>${r.ft||""}</td>
<td>${formatDate(r.validity)}</td>
<td>${r.type||""}</td>
<td>${r.tt||""}</td>
<td>${r.via||""}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')">📋</button>
<button onclick="dupRate('${r.id}')">📑</button>
<button onclick="editRate('${r.id}')">✏️</button>
<button onclick="delRate('${r.id}')">🗑️</button>
</td>
</tr>`;
});
$("tbody").innerHTML=h;
}

/* FILTER */
function applyFilter(){
const f={};
document.querySelectorAll("thead input").forEach(i=>{
if(i.value)f[i.dataset.col]=i.value.toLowerCase();
});
const g=$("globalSearch").value.toLowerCase();

view=data.filter(r=>{
const col=Object.keys(f).every(k=>
(r[k]||"").toString().toLowerCase().includes(f[k])
);
const glob=Object.values(r).some(v=>
(v||"").toString().toLowerCase().includes(g)
);
return col && glob;
});
render();
}

/* ===== FIX: MAKE BUTTONS WORK ===== */
window.copyRate = async(id)=>{
const r=data.find(x=>x.id===id);
const type=r.type==="S"?"SAILING":"VALIDITY";

const txt=
`${r.carrier?`CARRIER: ${r.carrier}\n`:""}`+
`${r.por?`(POR) : ${r.por}\n`:""}O/F FM ${r.pol} TO ${r.pod} @ USD ${r.dv20}/20DV & USD ${r.hc40}/40HC
${r.ft?`F/T: ${r.ft} DAYS\n`:""}VALIDITY: ${formatDate(r.validity)} (${type})
TT: ${r.tt} (DAYS)
ROUTING: ${cleanRouting(r.via)}`;

try{await navigator.clipboard.writeText(txt);}
catch{
const t=document.createElement("textarea");
t.value=txt;document.body.appendChild(t);
t.select();document.execCommand("copy");
document.body.removeChild(t);
}

alert("Copied");
};

window.editRate=(id)=>{
const r=data.find(x=>x.id===id);
editId=id;
Object.keys(r).forEach(k=>{if($(k))$(k).value=r[k]});
};

window.delRate=async(id)=>{
await deleteDoc(doc(db,"rates",id));
alert("Deleted");
load();
};

window.dupRate=async(id)=>{
const r=data.find(x=>x.id===id);
const c={...r};delete c.id;
await addDoc(collection(db,"rates"),c);
alert("Duplicated");
load();
};

/* SAVE */
$("save").onclick=async()=>{
const type=$("stype").checked?"S":"V";
await addDoc(collection(db,"rates"),{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
ft:$("ft").value,
validity:$("validity").value,
tt:$("tt").value,
via:$("via").value,
type:type,
seq:genSeq($("validity").value,$("tt").value,type)
});
alert("Saved");
load();
};

/* UPDATE */
$("update").onclick=async()=>{
if(!editId)return alert("Select record");
await updateDoc(doc(db,"rates",editId),{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
ft:$("ft").value,
validity:$("validity").value,
tt:$("tt").value,
via:$("via").value
});
alert("Updated");
load();
};

document.querySelectorAll("thead input").forEach(i=>i.oninput=applyFilter);
$("globalSearch").oninput=applyFilter;

$("clear").onclick=()=>location.reload();

load();

</script>

</body>
</html>
