<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FR8X CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* GLOBAL */
body{
font-family:Calibri;
font-size:12px;
margin:0;
background:#eef2f7;
}

.header{
background:#0f172a;
color:#fff;
padding:10px;
font-weight:600;
text-align:center;
}

.container{
padding:8px;
}

/* FORM */
.form-grid{
display:flex;
flex-wrap:wrap;
gap:4px;
}

input{
height:28px;
padding:4px 6px;
border-radius:6px;
border:1px solid #ccc;
text-transform:uppercase;
font-size:12px;
flex:1 1 120px;
min-width:100px;
}

button{
height:28px;
padding:0 10px;
border:none;
border-radius:6px;
background:#e2e8f0;
cursor:pointer;
font-size:12px;
}

.primary{
background:#2563eb;
color:#fff;
}

/* TABLE */
.table-wrap{
overflow-x:auto;
margin-top:8px;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th,td{
border:1px solid #d1d5db;
padding:4px 6px;
font-size:12px;
white-space:nowrap;
text-align:center;
}

th{
background:#e5e7eb;
}

.actions button{
margin:0 2px;
}

/* MOBILE */
@media(max-width:768px){

.form-grid{
flex-direction:column;
}

input{
width:100%;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="header">FR8X CRM</div>

<div class="container">

<!-- FORM -->
<div class="form-grid">

<input id="carrier" list="carrierList" placeholder="Carrier">
<datalist id="carrierList"></datalist>

<input id="por" placeholder="POR">

<input id="pol" list="polList" placeholder="POL">
<datalist id="polList"></datalist>

<input id="pod" list="podList" placeholder="POD">
<datalist id="podList"></datalist>

<input id="fpod" list="fpodList" placeholder="FPOD">
<datalist id="fpodList"></datalist>

<input id="dv20" placeholder="20DV USD">
<input id="hc40" placeholder="40HC USD">

<input id="validity" type="date">
<input id="tt" placeholder="TT">

<input id="via" list="viaList" placeholder="Routing">
<datalist id="viaList"></datalist>

<button class="primary" id="save"><i class="bi bi-save"></i></button>
<button id="update"><i class="bi bi-arrow-repeat"></i></button>
<button id="clear"><i class="bi bi-x"></i></button>

</div>

<!-- TABLE -->
<div class="table-wrap">
<table>

<thead>
<tr>
<th>Carrier<br><input data-col="carrier"></th>
<th>POR<br><input data-col="por"></th>
<th>POL<br><input data-col="pol"></th>
<th>POD<br><input data-col="pod"></th>
<th>FPOD<br><input data-col="fpod"></th>
<th>20DV<br><input data-col="dv20"></th>
<th>40HC<br><input data-col="hc40"></th>
<th>Validity<br><input data-col="validity"></th>
<th>TT<br><input data-col="tt"></th>
<th>Routing<br><input data-col="via"></th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyDrJFZfIgXwzFX1d2jdCUT8oykGmGbg0IE",
authDomain:"swifty-52e05.firebaseapp.com",
projectId:"swifty-52e05",
storageBucket:"swifty-52e05.firebasestorage.app",
messagingSenderId:"230029744245",
appId:"1:230029744245:web:1e6335ddb8d116ad9a003c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let data=[],view=[],editId=null;

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* SMART CALC */
function calc(val){
if(!val) return "";
val = val.replace(/\s+/g, "+");
if(val.includes("+")){
try{
return val.split("+").map(Number).reduce((a,b)=>a+b,0);
}catch{return val;}
}
return val;
}

/* LIVE INPUT */
["dv20","hc40"].forEach(id=>{
const el=$(id);

el.addEventListener("input",()=>{
el.value=el.value.replace(/\s+/g,"+");
});

el.addEventListener("blur",()=>{
el.value=calc(el.value);
});
});

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"rates"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
view=[...data];
render();
updateDatalist();
}

/* RENDER */
function render(){
let html="";
view.forEach(r=>{
html+=`
<tr>
<td>${r.carrier||""}</td>
<td>${r.por||""}</td>
<td>${r.pol||""}</td>
<td>${r.pod||""}</td>
<td>${r.fpod||""}</td>
<td>${r.dv20||""}</td>
<td>${r.hc40||""}</td>
<td>${r.validity||""}</td>
<td>${r.tt||""}</td>
<td>${r.via||""}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')"><i class="bi bi-copy"></i></button>
<button onclick="editRate('${r.id}')"><i class="bi bi-pencil"></i></button>
<button onclick="delRate('${r.id}')"><i class="bi bi-trash"></i></button>
</td>
</tr>`;
});
$("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async()=>{
await addDoc(collection(db,"rates"),getForm());
clearForm();load();
};

/* UPDATE */
$("update").onclick=async()=>{
if(!editId)return;
await updateDoc(doc(db,"rates",editId),getForm());
clearForm();load();
};

/* DELETE */
window.delRate=async(id)=>{
await deleteDoc(doc(db,"rates",id));load();
};

/* EDIT */
window.editRate=id=>{
const r=data.find(x=>x.id===id);
editId=id;
Object.keys(r).forEach(k=>{if($(k))$(k).value=r[k]});
};

/* COPY (FIXED PRO VERSION) */
window.copyRate = async (id) => {
const r = data.find(x => x.id === id);

const route = r.fpod 
? `${r.pol} TO ${r.fpod} VIA ${r.pod}`
: `${r.pol} TO ${r.pod}`;

const text =
`O/F FM ${route} @ USD ${r.dv20}/20DV & USD ${r.hc40}/40HC
VALIDITY: ${r.validity}
TT: ${r.tt}
ROUTING: ${r.via}`;

try {
await navigator.clipboard.writeText(text);
} catch (err) {

const textarea = document.createElement("textarea");
textarea.value = text;
document.body.appendChild(textarea);
textarea.select();

try {
document.execCommand("copy");
} catch {}

document.body.removeChild(textarea);
}
};

/* FORM */
function getForm(){
return{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
fpod:upper($("fpod").value),
dv20:calc($("dv20").value),
hc40:calc($("hc40").value),
validity:$("validity").value,
tt:$("tt").value,
via:upper($("via").value)
};
}

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
editId=null;
}

/* FILTER */
document.querySelectorAll("thead input").forEach(inp=>{
inp.oninput=()=>{
let f={};
document.querySelectorAll("thead input").forEach(i=>{
if(i.value)f[i.dataset.col]=i.value.toLowerCase();
});
view=data.filter(r=>{
return Object.keys(f).every(k=>
(r[k]||"").toLowerCase().includes(f[k])
);
});
render();
};
});

/* AUTOCOMPLETE */
function updateDatalist(){
["carrier","pol","pod","fpod","via"].forEach(f=>{
const list=document.getElementById(f+"List");
if(!list) return;
const unique=[...new Set(data.map(r=>r[f]).filter(Boolean))];
list.innerHTML=unique.map(v=>`<option value="${v}">`).join("");
});
}

$("clear").onclick=clearForm;

load();

</script>

</body>
</html>
