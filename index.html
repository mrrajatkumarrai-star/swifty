<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FR8X CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* GLOBAL */
body{
font-family:Calibri;
font-size:12px;
margin:0;
background:#eef2f7;
}

/* HEADER */
.header{
background:#0f172a;
color:#fff;
padding:8px 12px;
font-weight:600;
}

/* CONTAINER */
.container{
padding:6px;
}

/* FORM GRID */
.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:4px;
}

/* INPUT */
input{
height:24px;
padding:2px 6px;
border-radius:4px;
border:1px solid #ccc;
text-transform:uppercase;
font-size:12px;
width:100%;
}

/* BUTTON */
button{
height:24px;
border:none;
border-radius:4px;
background:#e2e8f0;
cursor:pointer;
font-size:12px;
padding:0 6px;
}
.primary{background:#2563eb;color:#fff}

/* TABLE */
.table-wrap{
overflow-x:auto;
margin-top:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #d1d5db;
padding:2px 4px;
font-size:12px;
white-space:nowrap;
text-align:center;
}

td.num{
text-align:right;
}

th{
background:#e5e7eb;
}

/* ACTION BUTTONS */
.actions button{
padding:0 4px;
}

/* CHECKBOX STYLE */
.chk{
display:flex;
gap:6px;
align-items:center;
}

</style>
</head>

<body>

<div class="header">FR8X CRM</div>

<div class="container">

<!-- FORM -->
<div class="form-grid">

<input id="carrier" placeholder="Carrier">
<input id="por" placeholder="POR">
<input id="pol" placeholder="POL">
<input id="pod" placeholder="POD">
<input id="fpod" placeholder="FPOD">

<input id="dv20" placeholder="20DV">
<input id="hc40" placeholder="40HC">

<input id="validity" type="date">
<input id="tt" placeholder="TT">
<input id="via" placeholder="Routing">

<div class="chk">
<label><input type="checkbox" id="vtype" checked> V</label>
<label><input type="checkbox" id="stype"> S</label>
</div>

<button class="primary" id="save"><i class="bi bi-save"></i></button>
<button id="update"><i class="bi bi-arrow-repeat"></i></button>
<button id="clear"><i class="bi bi-x"></i></button>

</div>

<!-- TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Carrier</th>
<th>POR</th>
<th>POL</th>
<th>POD</th>
<th>20DV</th>
<th>40HC</th>
<th>Date</th>
<th>Type</th>
<th>TT</th>
<th>Routing</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDrJFZfIgXwzFX1d2jdCUT8oykGmGbg0IE",
authDomain:"swifty-52e05.firebaseapp.com",
projectId:"swifty-52e05",
storageBucket:"swifty-52e05.firebasestorage.app",
messagingSenderId:"230029744245",
appId:"1:230029744245:web:1e6335ddb8d116ad9a003c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let data=[],editId=null;

const $=id=>document.getElementById(id);
const upper=v=>(v||"").toUpperCase();

/* DATE FORMAT */
function formatDate(d){
if(!d) return "";
const date=new Date(d);
const day=date.toLocaleDateString('en-GB',{day:'2-digit'});
const mon=date.toLocaleDateString('en-GB',{month:'short'}).toUpperCase();
const yr=date.getFullYear();
const wk=date.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase();
return `${day}-${mon}-${yr} (${wk})`;
}

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"rates"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

/* RENDER */
function render(){
let html="";
data.forEach(r=>{
html+=`
<tr>
<td>${r.carrier||""}</td>
<td>${r.por||""}</td>
<td>${r.pol||""}</td>
<td>${r.pod||""}</td>
<td class="num">${r.dv20||""}</td>
<td class="num">${r.hc40||""}</td>
<td>${formatDate(r.validity)}</td>
<td>${r.type||""}</td>
<td>${r.tt||""}</td>
<td>${r.via||""}</td>
<td class="actions">
<button onclick="copyRate('${r.id}')"><i class="bi bi-copy"></i></button>
<button onclick="editRate('${r.id}')"><i class="bi bi-pencil"></i></button>
<button onclick="delRate('${r.id}')"><i class="bi bi-trash"></i></button>
</td>
</tr>`;
});
$("tbody").innerHTML=html;
}

/* SAVE */
$("save").onclick=async()=>{
await addDoc(collection(db,"rates"),getForm());
clearForm();load();
};

/* DELETE */
window.delRate=async(id)=>{
await deleteDoc(doc(db,"rates",id));load();
};

/* EDIT */
window.editRate=id=>{
const r=data.find(x=>x.id===id);
editId=id;
Object.keys(r).forEach(k=>{if($(k))$(k).value=r[k]});
};

/* COPY (UPDATED FORMAT) */
window.copyRate=async(id)=>{
const r=data.find(x=>x.id===id);

const type = r.type === "S" ? "SAILING" : "VALIDITY";

const text =
`${r.por ? `(POR) : ${r.por}\n` : ""}` +
`O/F FM ${r.pol} TO ${r.pod} @ USD ${r.dv20}/20DV & USD ${r.hc40}/40HC
VALIDITY: ${formatDate(r.validity)} (${type})
TT: ${r.tt} (DAYS)
ROUTING: ${r.via} (DAYS)`;

try{
await navigator.clipboard.writeText(text);
}catch{
const t=document.createElement("textarea");
t.value=text;document.body.appendChild(t);
t.select();document.execCommand("copy");
document.body.removeChild(t);
}
};

/* FORM */
function getForm(){
let type = $("stype").checked ? "S" : "V";

return{
carrier:upper($("carrier").value),
por:upper($("por").value),
pol:upper($("pol").value),
pod:upper($("pod").value),
dv20:$("dv20").value,
hc40:$("hc40").value,
validity:$("validity").value,
tt:$("tt").value,
via:$("via").value,
type:type
};
}

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
$("vtype").checked=true;
$("stype").checked=false;
editId=null;
}

$("clear").onclick=clearForm;

load();

</script>

</body>
</html>
